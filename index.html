<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم الحروف الكورية - GKS Project</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        h1 { color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; max-width: 600px; margin: 30px auto; }
        .card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer;
            transition: 0.3s; border: 2px solid transparent;
        }
        .card:hover { transform: translateY(-5px); border-color: #ff4b5c; }
        .korean { font-size: 50px; color: #ff4b5c; display: block; margin-bottom: 10px; }
        .arabic { color: #666; font-size: 18px; }
        .info { background: #fff; padding: 15px; border-radius: 10px; display: inline-block; margin-top: 20px; color: #555; }
    </style>
</head>
<body>

    <h1>🇰🇷 مدرب الحروف الكورية (Hangul)</h1>
    <p>اضغطي على الحرف لتسمعي النطق الصحيح</p>

    <div class="grid">
        <!-- حرف أا -->
        <div class="card" onclick="speak('아')">
            <span class="korean">아</span>
            <span class="arabic">أا (A)</span>
        </div>
        <!-- حرف يا -->
        <div class="card" onclick="speak('야')">
            <span class="korean">야</span>
            <span class="arabic">يا (Ya)</span>
        </div>
        <!-- حرف أو -->
        <div class="card" onclick="speak('어')">
            <span class="korean">어</span>
            <span class="arabic">أو (Eo)</span>
        </div>
        <!-- حرف يو -->
        <div class="card" onclick="speak('여')">
            <span class="korean">여</span>
            <span class="arabic">يو (Yeo)</span>
        </div>
    </div>

    <div class="info">
        هذا المشروع جزء من خطتي الدراسية لمنحة GKS 🎓
    </div>

    <script>
        function speak(letter) {
            let msg = new SpeechSynthesisUtterance();
            msg.text = letter;
            msg.lang = 'ko-KR'; // تحديد اللغة الكورية للنطق
            msg.rate = 0.8;    // سرعة النطق (هادئة للتعلم)
            window.speechSynthesis.speak(msg);
        }
    </script>

</body>
</html>
